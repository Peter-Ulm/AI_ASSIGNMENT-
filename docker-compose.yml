services:
  # ── Local LLM runtime ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai-assignment-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── One-shot: pull the chat + embedding models, then exit ──────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ai-assignment-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        ollama pull ${OLLAMA_MODEL_NAME:-llama3.2:3b} &&
        ollama pull ${EMBEDDING_MODEL_NAME:-nomic-embed-text}
    restart: "no"

  # ── FastAPI backend ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-assignment-backend
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-llama3.2:3b}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-nomic-embed-text}
      DEFAULT_TEMPERATURE: ${DEFAULT_TEMPERATURE:-0.7}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      MAX_QUESTION_CHARS: ${MAX_QUESTION_CHARS:-1000}
      USE_RAG: ${USE_RAG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-7}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  # ── React / Vite frontend ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-assignment-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  ollama_data:
  frontend_node_modules:
